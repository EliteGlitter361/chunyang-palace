<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
  <title>ADMIN · 纯阳执事 | 天下第一纯阳宫</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: '华文楷体', 'KaiTi', '宋体', 'SimSun', 'Times New Roman', serif;
      background: #1c1610; min-height: 100vh; color: #e8dccc;
      display: flex; align-items: center; justify-content: center; padding: 1.5rem;
      position: relative; overflow-x: hidden;
      font-size: 1.05rem;
    }
    #dynamic-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; pointer-events: none; }
    .texture-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background-image: repeating-linear-gradient(45deg, rgba(200,180,150,0.02) 0px, rgba(200,180,150,0.02) 2px, transparent 2px, transparent 6px),
                        repeating-linear-gradient(135deg, rgba(170,140,100,0.02) 0px, rgba(170,140,100,0.02) 2px, transparent 2px, transparent 6px);
      pointer-events: none; z-index: -1;
    }
    .card {
      max-width: 600px; width: 100%;
      background: rgba(20, 16, 12, 0.85); backdrop-filter: blur(12px);
      border: 1px solid #8b7355; border-radius: 64px 20px 64px 20px;
      padding: 2.2rem; box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }
    .header { text-align: center; margin-bottom: 2rem; }
    h1 { font-size: 2.8rem; font-weight: normal; color: #eedcc7; text-shadow: 2px 2px 0 #3f2e1d; }
    .pure-yang { font-size: 1.4rem; color: #dbbc94; border-bottom: 1px dashed #8b7355; display: inline-block; }
    .info-bar { background: #2f271f70; border-radius: 32px; padding: 0.8rem; text-align: center; margin-bottom: 1.8rem; font-size: 1rem; }
    .input-group { margin-bottom: 1.3rem; text-align: left; }
    label { display: block; margin-bottom: 0.5rem; color: #dbbc94; font-size: 1rem; }
    input {
      width: 100%; background: #2f271f; border: 1px solid #6b553b; padding: 0.8rem 1rem;
      border-radius: 48px; color: #f2e5d4; font-size: 1rem;
    }
    button {
      width: 100%; background: #b69062; border: none; padding: 0.8rem; border-radius: 60px;
      font-size: 1.1rem; font-weight: bold; color: #1c1610; cursor: pointer;
    }
    button:hover { background: #d1a775; transform: translateY(-2px); }
    .alert { background: rgba(180,80,60,0.2); border-left: 5px solid #e6a177; padding: 0.7rem 1rem; border-radius: 32px; margin-bottom: 1rem; display: none; font-size: 1rem; }
    .logout-link { text-align: center; margin-top: 1.8rem; }
    .logout-link a { color: #e6c9a2; text-decoration: underline; cursor: pointer; font-size: 1rem; }
  </style>
</head>
<body>
  <canvas id="dynamic-bg"></canvas>
  <div class="texture-overlay"></div>

  <div class="card">
    <div class="header"><h1>✨ ADMIN · 纯阳执事 ✨</h1><div class="pure-yang">护法善信 · 可修正己道钥</div></div>
    <div class="info-bar"><i class="fa-regular fa-id-card"></i> 当前护法：<strong id="currentUser">admin</strong><br><span style="font-size:0.9rem;">可修改个人法钥</span></div>
    <div id="pwdMsg" class="alert"></div>
    <div class="input-group"><label><i class="fa-regular fa-key"></i> 原法钥</label><input type="password" id="oldPassword" placeholder="当前密码"></div>
    <div class="input-group"><label><i class="fa-regular fa-lock"></i> 新法钥</label><input type="password" id="newPassword" placeholder="至少8位"></div>
    <div class="input-group"><label><i class="fa-regular fa-check-circle"></i> 确认新法钥</label><input type="password" id="confirmPassword" placeholder="再次输入"></div>
    <button id="changePwdBtn"><i class="fa-regular fa-pen-to-square"></i> 更新法钥</button>
    <div class="logout-link"><a id="logoutLink">← 返回登录界面</a></div>
  </div>

  <script>
    const API_BASE = '';
    const token = localStorage.getItem('adminToken');
    const user = JSON.parse(localStorage.getItem('adminUser') || '{}');
    if (!token || user.role !== 'admin') {
      window.location.href = 'login.html';
    }
    document.getElementById('currentUser').innerText = user.username;

    function showMsg(msg, isError = true) {
      const div = document.getElementById('pwdMsg');
      div.textContent = msg;
      div.style.display = 'block';
      div.style.borderLeftColor = isError ? "#e6a177" : "#7aa56e";
      setTimeout(() => { div.style.display = 'none'; }, 4000);
    }

    async function changePassword() {
      const oldPwd = document.getElementById('oldPassword').value;
      const newPwd = document.getElementById('newPassword').value;
      const confirmPwd = document.getElementById('confirmPassword').value;
      if (!oldPwd || !newPwd) { showMsg("请填写完整"); return; }
      if (newPwd.length < 8) { showMsg("新密码至少8位"); return; }
      if (newPwd !== confirmPwd) { showMsg("两次新密码不一致"); return; }
      try {
        const res = await fetch(`${API_BASE}/api/admin/change-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify({ oldPassword: oldPwd, newPassword: newPwd })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || '修改失败');
        showMsg("✅ 法钥已更新，请重新登录", false);
        setTimeout(() => {
          localStorage.removeItem('adminToken');
          localStorage.removeItem('adminUser');
          window.location.href = 'login.html';
        }, 2000);
      } catch (err) {
        showMsg(err.message);
      }
    }

    // 动态背景（PC）
    (function initBg() {
      const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
      if (isMobile) return;
      const canvas = document.getElementById('dynamic-bg');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      let w, h, time = 0;
      function resize() { w = window.innerWidth; h = window.innerHeight; canvas.width = w; canvas.height = h; }
      window.addEventListener('resize', resize);
      resize();
      const particles = Array.from({ length: 28 }, () => ({
        x: Math.random() * w, y: Math.random() * h, vx: (Math.random() - 0.5) * 0.2, vy: (Math.random() - 0.5) * 0.1,
        baseRadius: 120 + Math.random() * 200, radius: 120 + Math.random() * 200, opacity: 0.05 + Math.random() * 0.1, phase: Math.random() * 100
      }));
      function draw() {
        time += 0.02;
        ctx.clearRect(0, 0, w, h);
        particles.forEach(p => {
          p.radius = p.baseRadius * (0.85 + 0.15 * Math.sin(time * 1.5 + p.phase));
          p.x += p.vx; p.y += p.vy;
          if (p.x < -200) p.x = w + 200; if (p.x > w + 200) p.x = -200;
          if (p.y < -200) p.y = h + 200; if (p.y > h + 200) p.y = -200;
          ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
          const grad = ctx.createRadialGradient(p.x, p.y, p.radius * 0.3, p.x, p.y, p.radius);
          grad.addColorStop(0, `rgba(210, 180, 140, ${p.opacity * 1.2})`);
          grad.addColorStop(1, `rgba(120, 90, 65, ${p.opacity * 0.5})`);
          ctx.fillStyle = grad; ctx.filter = 'blur(48px)'; ctx.fill();
        });
        ctx.filter = 'none';
        requestAnimationFrame(draw);
      }
      draw();
    })();

    document.getElementById('changePwdBtn').addEventListener('click', changePassword);
    document.getElementById('logoutLink').addEventListener('click', () => {
      localStorage.removeItem('adminToken');
      localStorage.removeItem('adminUser');
      window.location.href = 'login.html';
    });
  </script>
</body>
</html>
