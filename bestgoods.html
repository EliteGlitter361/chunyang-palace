<html lang="zh-CN">
<head>

  <style>
    /* 与主页完全相同的样式，加上商品卡片和轮播相关样式 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: '华文楷体', 'KaiTi', '宋体', 'SimSun', 'Times New Roman', serif;
      background: #1c1610;
      min-height: 100vh;
      color: #e8dccc;
      line-height: 1.7;
      position: relative;
      overflow-x: hidden;
    }

    #dynamic-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
      pointer-events: none;
      display: block;
    }

    .texture-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        repeating-linear-gradient(45deg, rgba(200, 180, 150, 0.02) 0px, rgba(200, 180, 150, 0.02) 2px, transparent 2px, transparent 6px),

      pointer-events: none;
      z-index: -1;
    }

    .container {
      max-width: 1300px;
      margin: 2rem auto;
      padding: 2rem 2.5rem;
      background-color: rgba(20, 16, 12, 0.75);
      backdrop-filter: blur(8px);
      border: 1px solid #8b7355;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 0 1px #5f4d38 inset;
      border-radius: 40px 12px 40px 12px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1.5rem;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid #5f4d38;
    }

    .datetime {
      color: #dbbc94;
      letter-spacing: 1px;
      font-size: 1.25rem;
      font-weight: bold;
    }

    .top-links {
      display: flex;
      gap: 1.8rem;
      flex-wrap: wrap;
    }

    .top-links a {
      color: #e6c9a2;
      text-decoration: none;
      transition: all 0.3s ease;
      border-bottom: 1px dotted transparent;
      font-size: 1.2rem;
      padding: 0.3rem 0.8rem;
      border-radius: 30px;
      background-color: transparent;
      cursor: default;
    }

    .top-links a:hover {
      color: #1c1610;
      background-color: #dbbc94;
      border-bottom-color: #dbbc94;
      transform: scale(1.05);
      box-shadow: 0 2px 8px rgba(219, 188, 148, 0.3);
      font-weight: bold;
    }

    .top-links a.active {
      color: #1c1610;
      background-color: #dbbc94;
      border-bottom-color: #dbbc94;
      font-weight: bold;
      transform: scale(1.05);

      margin-bottom: 0.5rem;

      text-shadow: 4px 4px 0 #3f2e1d, 0 0 15px #a77b4f;

    .pure-yang {

      color: #dbbc94;
      margin: 0.2rem 0 1rem;
      letter-spacing: 6px;
      border-bottom: 1px dashed #8b7355;
      display: inline-block;
      padding-bottom: 0.3rem;

    .section-title {

      text-align: center;

      margin: 3rem 0 2rem;
      letter-spacing: 2px;

      justify-content: center;
      gap: 1rem;

      border: 1px solid #7a6246;

    .goods-card:hover {
      transform: translateY(-4px);

      box-shadow: 0 18px 30px -8px #000, 0 0 0 2px #b69062 inset;

    .goods-card h3 {
      font-size: 2rem;
      font-weight: normal;
      color: #eed7ba;
      border-bottom: 2px dotted #7a6246;
      padding-bottom: 0.8rem;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .goods-card h3 i {
      color: #b69062;
      font-size: 2rem;
    }

    .goods-card p {
      color: #dacbb6;

      margin-bottom: 0.5rem;
    }

    /* 价格样式：红色，微软雅黑，二号字，左对齐 */
    .price {

      font-family: 'Microsoft YaHei', '微软雅黑', sans-serif !important;
      font-size: 1.5rem !important;
      margin: 0.8rem 0 0 0 !important;
      text-align: left !important;
    }

    /* 轮播容器 */
    .carousel {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      background: rgba(0,0,0,0.3);
      border-radius: 24px 8px 24px 8px;
      overflow: hidden;
      border: 1px solid #6b553b;
      margin-top: 1rem;
    }

    .carousel-media {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .carousel-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 36px;
      height: 36px;
      background: rgba(0,0,0,0.6);
      color: #dbbc94;
      border: 1px solid #b69062;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.2rem;
      transition: all 0.2s;
      z-index: 2;
    }

    .carousel-arrow:hover {
      background: #b69062;
      color: #1c1610;
    }

    .carousel-arrow.left {
      left: 10px;
    }

    .carousel-arrow.right {
      right: 10px;
    }

    .carousel-arrow.hidden {
      display: none;
    }

    .carousel-index {
      position: absolute;
      bottom: 10px;
      right: 10px;
      background: rgba(0,0,0,0.6);
      color: #dbbc94;
      padding: 0.2rem 0.6rem;

      border: 1px solid #b69062;

      margin-bottom: 0.5rem;
    }
  </style>
</head>

  <script>
    (function() {
      // 设备检测
      function isMobile() {
        const ua = navigator.userAgent;
        return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(ua);
      }
      if (!isMobile()) {
        const canvas = document.getElementById('dynamic-bg');
        const ctx = canvas.getContext('2d');
        let width, height;
        let time = 0;

        function resizeCanvas() {
          width = window.innerWidth;
          height = window.innerHeight;
          canvas.width = width;
          canvas.height = height;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const particles = [];
        const PARTICLE_COUNT = 30;

        for (let i = 0; i < PARTICLE_COUNT; i++) {
          particles.push({
            x: Math.random() * width,
            y: Math.random() * height,
            vx: (Math.random() - 0.5) * 0.25,
            vy: (Math.random() - 0.5) * 0.15 + 0.02,
            baseRadius: 150 + Math.random() * 250,
            radius: 150 + Math.random() * 250,
            baseOpacity: 0.08 + Math.random() * 0.12,
            opacity: 0.08 + Math.random() * 0.12,
            phase: Math.random() * 100,
            color: `rgba(210, 175, 130, `,
          });
        }

        const darkParticles = [];
        const DARK_COUNT = 12;
        for (let i = 0; i < DARK_COUNT; i++) {
          darkParticles.push({
            x: Math.random() * width,
            y: Math.random() * height,
            vx: (Math.random() - 0.5) * 0.15,
            vy: (Math.random() - 0.5) * 0.08,
            baseRadius: 200 + Math.random() * 300,
            radius: 200 + Math.random() * 300,
            baseOpacity: 0.04 + Math.random() * 0.06,
            opacity: 0.04 + Math.random() * 0.06,
            phase: Math.random() * 100,
            color: `rgba(80, 70, 60, `,
          });
        }

        const sparkles = [];
        const SPARKLE_COUNT = 40;
        for (let i = 0; i < SPARKLE_COUNT; i++) {
          sparkles.push({
            x: Math.random() * width,
            y: Math.random() * height,
            vx: (Math.random() - 0.5) * 0.1,
            vy: (Math.random() - 0.5) * 0.05,
            size: 1 + Math.random() * 3,
            opacity: 0.1 + Math.random() * 0.2,
            phase: Math.random() * 100,
          });
        }

        function drawParticles() {
          time += 0.02;

          ctx.clearRect(0, 0, width, height);

          darkParticles.forEach(p => {
            p.radius = p.baseRadius * (0.9 + 0.1 * Math.sin(time * 1.5 + p.phase));
            p.opacity = p.baseOpacity * (0.8 + 0.2 * Math.sin(time * 1.2 + p.phase));

            p.x += p.vx;
            p.y += p.vy;

            if (p.x < -p.radius) p.x = width + p.radius;
            if (p.x > width + p.radius) p.x = -p.radius;
            if (p.y < -p.radius) p.y = height + p.radius;
            if (p.y > height + p.radius) p.y = -p.radius;

            ctx.beginPath();
            ctx.arc(p.x, p.y, p.radius, 0, 2 * Math.PI);
            ctx.fillStyle = p.color + p.opacity + ')';
            ctx.filter = 'blur(45px)';
            ctx.fill();
          });

          particles.forEach(p => {
            p.radius = p.baseRadius * (0.85 + 0.15 * Math.sin(time * 1.8 + p.phase));
            p.opacity = p.baseOpacity * (0.7 + 0.3 * Math.sin(time * 2.0 + p.phase));

            p.x += p.vx;
            p.y += p.vy;

            if (p.x < -p.radius) p.x = width + p.radius;
            if (p.x > width + p.radius) p.x = -p.radius;
            if (p.y < -p.radius) p.y = height + p.radius;
            if (p.y > height + p.radius) p.y = -p.radius;

            ctx.beginPath();
            ctx.arc(p.x, p.y, p.radius, 0, 2 * Math.PI);
            const gradient = ctx.createRadialGradient(p.x, p.y, p.radius*0.3, p.x, p.y, p.radius);
            gradient.addColorStop(0, `rgba(230, 200, 160, ${p.opacity*1.3})`);
            gradient.addColorStop(1, `rgba(160, 130, 100, ${p.opacity*0.5})`);
            ctx.fillStyle = gradient;
            ctx.filter = 'blur(55px)';
            ctx.fill();
          });

          ctx.filter = 'blur(3px)';
          sparkles.forEach(s => {
            let sparkleOpacity = s.opacity * (0.6 + 0.4 * Math.sin(time * 3 + s.phase));
            s.x += s.vx;
            s.y += s.vy;
            if (s.x < 0) s.x = width;
            if (s.x > width) s.x = 0;
            if (s.y < 0) s.y = height;
            if (s.y > height) s.y = 0;

            ctx.beginPath();
            ctx.arc(s.x, s.y, s.size, 0, 2 * Math.PI);
            ctx.fillStyle = `rgba(240, 220, 180, ${sparkleOpacity})`;
            ctx.fill();
          });
          ctx.filter = 'none';

          requestAnimationFrame(drawParticles);
        }

        drawParticles();
      }
    })();

    // 实时日期时间
    (function() {
      function getWeekday(date) {
        const weekdays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
        return weekdays[date.getDay()];
      }
      function getShichen(date) {
        const hour = date.getHours();
        if (hour >= 23 || hour < 1) return '子时';
        if (hour >= 1 && hour < 3) return '丑时';
        if (hour >= 3 && hour < 5) return '寅时';
        if (hour >= 5 && hour < 7) return '卯时';
        if (hour >= 7 && hour < 9) return '辰时';
        if (hour >= 9 && hour < 11) return '巳时';
        if (hour >= 11 && hour < 13) return '午时';
        if (hour >= 13 && hour < 15) return '未时';
        if (hour >= 15 && hour < 17) return '申时';
        if (hour >= 17 && hour < 19) return '酉时';
        if (hour >= 19 && hour < 21) return '戌时';
        if (hour >= 21 && hour < 23) return '亥时';
      }
      function updateDateTime() {
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const seconds = String(now.getSeconds()).padStart(2, '0');
        const weekday = getWeekday(now);
        const shichen = getShichen(now);
        const datetimeStr = `${year}年${month}月${day}日 ${hours}:${minutes}:${seconds} ${weekday} ${shichen}`;
        document.getElementById('liveDatetime').textContent = datetimeStr;
      }
      updateDateTime();
      setInterval(updateDateTime, 1000);
    })();

    // 商品轮播脚本
    (function() {
      const goodsData = [
        {
          id: 'yellowpaper',
          title: '手写黄纸',
          icon: 'fa-solid fa-scroll',
          desc: '传统手工制作，天然竹浆，色泽古雅。适用于抄经、符咒、书画。每张均为手写质感，保留古法韵味。',
          price: '59',
          files: [ { name: 'yellowpaper.jpg', type: 'image' } ]
        },
        {
          id: 'shanguimoney',
          title: '合金铜古币 · 开元山鬼花钱',
          icon: 'fa-solid fa-coins',
          desc: '精仿宋代山鬼花钱，合金铜材质，直径45mm。正面“开元通宝”，背面山鬼符咒，辟邪招财，佩带把玩皆宜。',
          price: '169',
          files: (() => {
            const arr = [];
            arr.push({ name: '1.mp4', type: 'video' });
            for (let i = 2; i <= 12; i++) {
              arr.push({ name: `${i}.jpg`, type: 'image' });
            }
            return arr;
          })()
        },
        {
          id: 'pinganfu',
          title: '天官赐福香包 · 平安福',
          icon: 'fa-solid fa-bag-shopping',
          desc: '手工布艺香包，内装天然艾草、朱砂等。正面刺绣“天官赐福”，背面为平安符。可悬挂于车内、床头，驱邪纳吉。',
          price: '15',
          files: [
            { name: '1.jpg', type: 'image' },
            { name: '2.jpg', type: 'image' },
            { name: '3.jpg', type: 'image' },
            { name: '4.jpg', type: 'image' },
            { name: '5.jpg', type: 'image' }
          ]
        },
        {
          id: 'bracelet',
          title: '静心手串 · 紫薇讳菩提手持',
          icon: 'fa-solid fa-hand-fist',
          desc: '精选六道木菩提根，手工雕刻紫薇讳符文。每颗珠子均刻有“紫薇讳”字样，搭配流苏，适合修行持诵或日常佩戴。',
          price: '19.9',
          files: [
            { name: '1.jpg', type: 'image' },
            { name: '2.jpg', type: 'image' },
            { name: '3.jpg', type: 'image' }
          ]
        }
      ];

      const goodsGrid = document.getElementById('goodsGrid');
      goodsGrid.innerHTML = '';
      const currentIndices = {};

      goodsData.forEach(item => {
        currentIndices[item.id] = 0;
        const card = document.createElement('div');
        card.className = 'goods-card';
        card.innerHTML = `<h3><i class="${item.icon}"></i> ${item.title}</h3><p>${item.desc}</p>`;

        const carousel = document.createElement('div');
        carousel.className = 'carousel';
        carousel.dataset.id = item.id;

        const firstFile = item.files[0];
        const media = document.createElement(firstFile.type === 'video' ? 'video' : 'img');
        media.className = 'carousel-media';
        if (firstFile.type === 'video') {
          media.controls = true;
          media.src = `goodsimage/${item.id}/${firstFile.name}`;
        } else {
          media.src = `goodsimage/${item.id}/${firstFile.name}`;
          media.alt = item.title;
        }
        carousel.appendChild(media);

        const indexSpan = document.createElement('span');
        indexSpan.className = 'carousel-index';
        indexSpan.textContent = `1 / ${item.files.length}`;
        carousel.appendChild(indexSpan);

        if (item.files.length > 1) {
          const leftArrow = document.createElement('div');
          leftArrow.className = 'carousel-arrow left';
          leftArrow.innerHTML = '&#10094;';
          leftArrow.addEventListener('click', (e) => {
            e.stopPropagation();
            let current = currentIndices[item.id];
            current = (current - 1 + item.files.length) % item.files.length;
            currentIndices[item.id] = current;
            const newFile = item.files[current];
            const newMedia = document.createElement(newFile.type === 'video' ? 'video' : 'img');
            newMedia.className = 'carousel-media';
            if (newFile.type === 'video') {
              newMedia.controls = true;
              newMedia.src = `goodsimage/${item.id}/${newFile.name}`;
            } else {
              newMedia.src = `goodsimage/${item.id}/${newFile.name}`;
              newMedia.alt = item.title;
            }
            const oldMedia = carousel.querySelector('.carousel-media');
            oldMedia.replaceWith(newMedia);
            indexSpan.textContent = `${current+1} / ${item.files.length}`;
          });
          carousel.appendChild(leftArrow);

          const rightArrow = document.createElement('div');
          rightArrow.className = 'carousel-arrow right';
          rightArrow.innerHTML = '&#10095;';
          rightArrow.addEventListener('click', (e) => {
            e.stopPropagation();
            let current = currentIndices[item.id];
            current = (current + 1) % item.files.length;
            currentIndices[item.id] = current;
            const newFile = item.files[current];
            const newMedia = document.createElement(newFile.type === 'video' ? 'video' : 'img');
            newMedia.className = 'carousel-media';
            if (newFile.type === 'video') {
              newMedia.controls = true;
              newMedia.src = `goodsimage/${item.id}/${newFile.name}`;
            } else {
              newMedia.src = `goodsimage/${item.id}/${newFile.name}`;
              newMedia.alt = item.title;
            }
            const oldMedia = carousel.querySelector('.carousel-media');
            oldMedia.replaceWith(newMedia);
            indexSpan.textContent = `${current+1} / ${item.files.length}`;
          });
          carousel.appendChild(rightArrow);
        }

        card.appendChild(carousel);
        const priceElement = document.createElement('p');
        priceElement.className = 'price';
        priceElement.textContent = `¥ ${item.price}`;
        card.appendChild(priceElement);

        goodsGrid.appendChild(card);
      });
    })();
  </script>
</body>
</html>
